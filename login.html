<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EduFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Edu<span>Flow</span></a>
    <div class="nav-right">
      <a href="index.html" class="btn-ghost">← Home</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo">Edu<span>Flow</span></a>
        <h2>Welcome back</h2>
        <p>Sign in to continue learning</p>
      </div>

      <!-- Outline 9: Error Handling -->
      <div id="error-msg" class="alert alert-error" style="display:none"></div>
      <div id="success-msg" class="alert alert-success" style="display:none"></div>

      <!-- Outline 4: Event Listeners -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" class="input-field" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" class="input-field" />
      </div>

      <button id="login-btn" class="btn-primary full" >Sign In</button>

      <p class="auth-link">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (getCurrentUser()) window.location.href = 'index.html';
  </script>
</body>
</html>
