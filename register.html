<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — EduFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Edu<span>Flow</span></a>
    <div class="nav-right">
      <a href="index.html" class="btn-ghost">← Home</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo">Edu<span>Flow</span></a>
        <h2>Create your account</h2>
        <p>Join thousands of learners worldwide</p>
      </div>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>
      <div id="success-msg" class="alert alert-success" style="display:none"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="johndoe" class="input-field" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" class="input-field" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" class="input-field" />
      </div>

      <!-- Role Toggle -->
      <div class="form-group">
        <label>I am a...</label>
        <div class="role-toggle">
          <button id="btn-student" class="role-btn active" >🎓 Student</button>
          <button id="btn-instructor" class="role-btn" >📚 Instructor</button>
        </div>
      </div>

      <button id="register-btn" class="btn-primary full" >Create Account</button>

      <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (getCurrentUser()) window.location.href = 'index.html';
  </script>
</body>
</html>
